name: dhamma_school_app
description: Dhamma School Student Management System — Mahamevnawa Buddhist Monastery, Melbourne
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Forms
  reactive_forms: ^17.0.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # UI
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  badges: ^3.1.2

  # Utils
  uuid: ^4.4.0
  path: ^1.9.0
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.2.2
  csv: ^6.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/l10n/

